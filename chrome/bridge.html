<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Conversation Bridge - Claude Exporter</title>
<style>
  :root {
    --bg-body: #1e1e1e;
    --bg-card: #262626;
    --text-primary: #e0e0e0;
    --text-secondary: #999;
    --text-muted: #808080;
    --border-color: #3a3a3a;
    --border-light: #333333;
    --primary-color: #7c6ef2;
    --primary-hover: #6d5ef0;
    --secondary-color: #14b8a6;
    --secondary-hover: #2dd4bf;
    --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 55%, #ec4899 100%);
    --gradient-primary-hover: linear-gradient(135deg, #565af0 0%, #9333ea 55%, #db2777 100%);
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --disabled-bg: #3a3a3a;
    --disabled-text: #808080;
    --success-bg: #1a4d2e;
    --success-text: #90ee90;
    --error-bg: #4d1a1a;
    --error-text: #ff9999;
    --info-bg: #1a3d4d;
    --info-text: #87ceeb;
    --shadow-sm: rgba(0, 0, 0, 0.3);
    --shadow-md: rgba(0, 0, 0, 0.5);
    --focus-ring: rgba(124, 110, 242, 0.25);
  }
  :root[data-theme="light"] {
    --bg-body: #f6f7f9;
    --bg-card: #ffffff;
    --text-primary: #2c313a;
    --text-secondary: #666;
    --text-muted: #999999;
    --border-color: #e2e4e9;
    --border-light: #f0f0f0;
    --primary-color: #6d4de6;
    --primary-hover: #5638c9;
    --secondary-color: #0d9488;
    --secondary-hover: #0f766e;
    --gradient-primary: linear-gradient(135deg, #4f46e5 0%, #9333ea 55%, #db2777 100%);
    --gradient-primary-hover: linear-gradient(135deg, #4338ca 0%, #7e22ce 55%, #be185d 100%);
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --disabled-bg: #e9ecef;
    --disabled-text: #999999;
    --success-bg: #d1fae5;
    --success-text: #065f46;
    --error-bg: #fee2e2;
    --error-text: #991b1b;
    --info-bg: #e0f2fe;
    --info-text: #075985;
    --shadow-sm: rgba(0, 0, 0, 0.05);
    --shadow-md: rgba(0, 0, 0, 0.15);
    --focus-ring: rgba(109, 77, 230, 0.2);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI Variable', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
  }
  #bridge-header {
    padding: 20px 28px;
    background: var(--gradient-primary);
    color: #fff;
  }
  #bridge-header h1 { margin: 0; font-size: 19px; font-weight: 700; letter-spacing: 0.2px; }
  #bridge-header p { margin: 4px 0 0; font-size: 13px; opacity: 0.9; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px 28px 60px; }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .toolbar label { font-size: 13px; display: flex; align-items: center; gap: 6px; }
  select, input[type="text"] {
    background: var(--bg-body);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 13px;
  }
  select:focus, input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 2px var(--focus-ring);
  }
  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--primary-color);
  }
  button {
    border: none;
    border-radius: var(--radius-md);
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1px;
    cursor: pointer;
    background: var(--gradient-primary);
    color: #fff;
    box-shadow: 0 2px 8px var(--shadow-sm);
    transition: filter 0.15s, box-shadow 0.15s;
  }
  button:hover { filter: brightness(1.08); box-shadow: 0 4px 12px var(--shadow-md); }
  button:disabled { background: var(--disabled-bg); color: var(--disabled-text); cursor: not-allowed; box-shadow: none; filter: none; }
  button.secondary { background: var(--secondary-color); }
  button.secondary:hover { background: var(--secondary-hover); filter: none; }
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 16px;
  }
  .section h2 { margin: 0 0 8px; font-size: 14px; }
  .section h2 .count { color: var(--text-secondary); font-weight: normal; }
  textarea {
    width: 100%;
    min-height: 90px;
    background: var(--bg-body);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
  }
  .hint { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0; }
  #status { margin: 10px 0; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; display: none; }
  #status.success { background: var(--success-bg); color: var(--success-text); display: block; }
  #status.error { background: var(--error-bg); color: var(--error-text); display: block; }
  #status.info { background: var(--info-bg); color: var(--info-text); display: block; }
  #aiToggleWrap { opacity: 1; }
  #aiToggleWrap.disabled { opacity: 0.5; }
  pre.preview {
    background: var(--bg-body);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 12px;
    max-height: 260px;
    overflow: auto;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
  <div id="bridge-header">
    <h1>AI Conversation Bridge</h1>
    <p>Distill this conversation into a handoff package for another LLM.</p>
  </div>
  <div class="container">
    <div class="toolbar">
      <label>Transfer mode:
        <select id="mode">
          <option value="coding">Coding</option>
          <option value="research">Research</option>
          <option value="writing">Writing</option>
          <option value="brainstorming">Brainstorming</option>
        </select>
      </label>
      <label id="aiToggleWrap" title="Refine the extraction using your configured AI provider's API key (set in Options)">
        <input type="checkbox" id="aiEnhanced">
        AI-enhanced extraction
      </label>
      <button id="regenerate">Regenerate</button>
    </div>

    <div id="status"></div>

    <div id="sections"></div>

    <div class="actions">
      <button id="copyMarkdown">Copy Markdown Prompt</button>
      <button id="downloadMarkdown" class="secondary">Download Markdown</button>
      <button id="downloadJson" class="secondary">Download JSON</button>
    </div>

    <div class="section">
      <h2>Preview (Markdown Prompt)</h2>
      <pre class="preview" id="preview"></pre>
    </div>
  </div>

  <script src="popup-theme.js"></script>
  <script src="utils.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
