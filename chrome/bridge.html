<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Conversation Bridge - Claude Exporter</title>
<style>
  :root {
    --bg-color: #1e1e1e;
    --bg-card: #262626;
    --text-color: #e0e0e0;
    --text-secondary: #999;
    --border-color: #3a3a3a;
    --primary-color: #6b52e8;
    --primary-hover: #7d66f0;
    --secondary-color: #32b34a;
    --secondary-hover: #3cc752;
    --disabled-bg: #3a3a3a;
    --success-bg: #1a4d2e;
    --success-text: #90ee90;
    --error-bg: #4d1a1a;
    --error-text: #ff9999;
    --info-bg: #1a3d4d;
    --info-text: #87ceeb;
  }
  :root[data-theme="light"] {
    --bg-color: #f6f7f9;
    --bg-card: #ffffff;
    --text-color: #2c313a;
    --text-secondary: #666;
    --border-color: #e2e4e9;
    --primary-color: #5d44e8;
    --primary-hover: #4a35ba;
    --secondary-color: #10b981;
    --secondary-hover: #059669;
    --disabled-bg: #e9ecef;
    --success-bg: #d1fae5;
    --success-text: #065f46;
    --error-bg: #fee2e2;
    --error-text: #991b1b;
    --info-bg: #e0f2fe;
    --info-text: #075985;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
  }
  #bridge-header {
    padding: 18px 28px;
    background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
    color: #fff;
  }
  #bridge-header h1 { margin: 0; font-size: 18px; }
  #bridge-header p { margin: 4px 0 0; font-size: 13px; opacity: 0.85; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px 28px 60px; }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .toolbar label { font-size: 13px; display: flex; align-items: center; gap: 6px; }
  select, input[type="text"] {
    background: var(--bg-color);
    color: var(--text-color);
    border: 1px solid var(--border-color);
    border-radius: 5px;
    padding: 5px 8px;
    font-size: 13px;
  }
  button {
    border: none;
    border-radius: 5px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    background: var(--primary-color);
    color: #fff;
  }
  button:hover { background: var(--primary-hover); }
  button:disabled { background: var(--disabled-bg); color: var(--text-secondary); cursor: not-allowed; }
  button.secondary { background: var(--secondary-color); }
  button.secondary:hover { background: var(--secondary-hover); }
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .section h2 { margin: 0 0 8px; font-size: 14px; }
  .section h2 .count { color: var(--text-secondary); font-weight: normal; }
  textarea {
    width: 100%;
    min-height: 90px;
    background: var(--bg-color);
    color: var(--text-color);
    border: 1px solid var(--border-color);
    border-radius: 5px;
    padding: 8px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
  }
  .hint { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0; }
  #status { margin: 10px 0; padding: 8px 12px; border-radius: 5px; font-size: 13px; display: none; }
  #status.success { background: var(--success-bg); color: var(--success-text); display: block; }
  #status.error { background: var(--error-bg); color: var(--error-text); display: block; }
  #status.info { background: var(--info-bg); color: var(--info-text); display: block; }
  #aiToggleWrap { opacity: 1; }
  #aiToggleWrap.disabled { opacity: 0.5; }
  pre.preview {
    background: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: 5px;
    padding: 10px;
    font-size: 12px;
    max-height: 260px;
    overflow: auto;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
  <div id="bridge-header">
    <h1>AI Conversation Bridge</h1>
    <p>Distill this conversation into a handoff package for another LLM.</p>
  </div>
  <div class="container">
    <div class="toolbar">
      <label>Transfer mode:
        <select id="mode">
          <option value="coding">Coding</option>
          <option value="research">Research</option>
          <option value="writing">Writing</option>
          <option value="brainstorming">Brainstorming</option>
        </select>
      </label>
      <label id="aiToggleWrap" title="Refine the extraction using your Anthropic API key (set in Options)">
        <input type="checkbox" id="aiEnhanced">
        AI-enhanced extraction
      </label>
      <button id="regenerate">Regenerate</button>
    </div>

    <div id="status"></div>

    <div id="sections"></div>

    <div class="actions">
      <button id="copyMarkdown">Copy Markdown Prompt</button>
      <button id="downloadMarkdown" class="secondary">Download Markdown</button>
      <button id="downloadJson" class="secondary">Download JSON</button>
    </div>

    <div class="section">
      <h2>Preview (Markdown Prompt)</h2>
      <pre class="preview" id="preview"></pre>
    </div>
  </div>

  <script src="popup-theme.js"></script>
  <script src="utils.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
