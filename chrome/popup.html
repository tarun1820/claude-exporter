<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* Dark mode by default */
    :root {
      --bg-body: #1e1e1e;
      --text-primary: #e0e0e0;
      --text-muted: #808080;
      --border-color: #3a3a3a;
      --border-light: #333333;
      --primary-color: #7c6ef2;
      --primary-hover: #6d5ef0;
      --secondary-color: #14b8a6;
      --secondary-hover: #2dd4bf;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 55%, #ec4899 100%);
      --gradient-primary-hover: linear-gradient(135deg, #565af0 0%, #9333ea 55%, #db2777 100%);
      --radius-sm: 8px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --disabled-bg: #3a3a3a;
      --disabled-text: #808080;
      --success-bg: #1a4d2e;
      --success-text: #90ee90;
      --error-bg: #4d1a1a;
      --error-text: #ff9999;
      --info-bg: #1a3d4d;
      --info-text: #87ceeb;
      --link-color: #a78bfa;
      --shadow-sm: rgba(0, 0, 0, 0.3);
      --shadow-md: rgba(0, 0, 0, 0.5);
      --focus-ring: rgba(124, 110, 242, 0.25);
    }

    /* Light mode when system prefers light */
    :root[data-theme="light"] {
      --bg-body: #f6f7f9;
      --text-primary: #2c313a;
      --text-muted: #999999;
      --border-color: #e2e4e9;
      --border-light: #f0f0f0;
      --primary-color: #6d4de6;
      --primary-hover: #5638c9;
      --secondary-color: #0d9488;
      --secondary-hover: #0f766e;
      --gradient-primary: linear-gradient(135deg, #4f46e5 0%, #9333ea 55%, #db2777 100%);
      --gradient-primary-hover: linear-gradient(135deg, #4338ca 0%, #7e22ce 55%, #be185d 100%);
      --radius-sm: 8px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --disabled-bg: #e9ecef;
      --disabled-text: #999999;
      --success-bg: #d1fae5;
      --success-text: #065f46;
      --error-bg: #fee2e2;
      --error-text: #991b1b;
      --info-bg: #e0f2fe;
      --info-text: #075985;
      --link-color: #6d4de6;
      --shadow-sm: rgba(0, 0, 0, 0.05);
      --shadow-md: rgba(0, 0, 0, 0.15);
      --focus-ring: rgba(109, 77, 230, 0.2);
    }

    body {
      width: 280px;
      padding: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI Variable', 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background-color: var(--bg-body);
      color: var(--text-primary);
      min-height: 0;
      max-height: 600px;
      overflow-y: auto;
    }
    h2 {
      margin-top: 0;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 700;
    }
    button {
      width: 100%;
      padding: 9px 14px;
      margin: 4px 0;
      border: none;
      border-radius: var(--radius-md);
      background: var(--gradient-primary);
      color: white;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1px;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow-sm);
      transition: filter 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    button:hover {
      filter: brightness(1.08);
      box-shadow: 0 4px 12px var(--shadow-md);
    }
    button:active {
      transform: translateY(1px);
    }
    button:disabled {
      background: var(--disabled-bg);
      cursor: not-allowed;
      color: var(--disabled-text);
      box-shadow: none;
      filter: none;
    }
    #browseConversations {
      background: var(--secondary-color);
      margin-top: 6px;
    }
    #browseConversations:hover {
      background: var(--secondary-hover);
      filter: none;
    }
    .status {
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
    }
    .success {
      background: var(--success-bg);
      color: var(--success-text);
    }
    .error {
      background: var(--error-bg);
      color: var(--error-text);
    }
    .info {
      background: var(--info-bg);
      color: var(--info-text);
    }
    .info a {
      color: var(--link-color);
    }
    .options {
      margin: 8px 0;
    }
    label {
      display: block;
      margin: 6px;
      font-size: 12px;
      color: var(--text-primary);
    }
    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      margin-right: 5px;
      accent-color: var(--primary-color);
      vertical-align: middle;
    }
    select {
      width: 100%;
      padding: 5px 8px;
      margin-top: 3px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background-color: var(--bg-body);
      color: var(--text-primary);
      font-size: 12px;
    }
    select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px var(--focus-ring);
    }
    #popup-header {
      margin: -8px -8px 8px -8px;
      padding: 16px;
      background: var(--gradient-primary);
      text-align: center;
    }
    #header-title {
      color: white;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    #header-version {
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <div id="popup-header">
    <div id="header-title">Claude Exporter</div>
    <div id="header-version"></div>
  </div>
  <div style="padding: 0 5px;">
    <div class="options">
    <!-- Chat Export Options -->
    <div class="export-row">
      <label>
        Chat format:
        <select id="format">
          <option value="json">JSON</option>
          <option value="markdown">Markdown</option>
          <option value="text">Plain Text</option>
        </select>
      </label>

      <label title="Include the conversation messages in the exported file">
        <input type="checkbox" id="includeChats" checked>
        Chats
      </label>

      <label title="Include extended thinking blocks in the exported conversation">
        <input type="checkbox" id="includeThinking">
        Extended Thinking
      </label>

      <label title="Add conversation metadata (name, date, model, etc.) at the top of exported files">
        <input type="checkbox" id="includeMetadata">
        Metadata
      </label>
    </div>

    <!-- Artifact Export Options -->
    <div class="export-row" style="margin-top: 12px;">
      <label>
        Artifact format:
        <select id="artifactFormat">
          <option value="original">Original</option>
          <option value="markdown">Markdown</option>
          <option value="text">Plain Text</option>
          <option value="json">JSON</option>
        </select>
      </label>

      <label title="Include artifacts (code, documents, etc.) directly within the conversation text">
        <input type="checkbox" id="includeArtifacts">
        Inline Artifacts
      </label>

      <label title="Extract artifacts as separate files in nested folders">
        <input type="checkbox" id="extractArtifacts">
        Nested Artifacts
      </label>

      <label title="Flatten artifact structure (no subfolders, with conversation name prefix)">
        <input type="checkbox" id="flattenArtifacts">
        Flat Artifacts
      </label>
    </div>
  </div>

  <button id="exportCurrent">Export Current Conversation</button>
  <button id="exportAll">Export All Conversations</button>
  <button id="bridgeCurrent">Bridge to Another AI</button>

  <button id="browseConversations">Browse All Conversations</button>
  
  <div id="status"></div>
  </div>

  <script src="popup-theme.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
